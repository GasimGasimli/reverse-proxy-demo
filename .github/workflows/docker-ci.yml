name: Docker CI

on:
  push:
    branches: ["main"]

jobs:
  validate-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Validate compose file
        run: docker-compose -f compose.yaml config
