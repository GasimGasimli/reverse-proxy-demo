version: '3'

services:
  app1:
    image: nginx:latest
    container_name: app1
    volumes:
      - ./app1/index.html:/usr/share/nginx/html/index.html:ro

  app2:
    image: nginx:latest
    container_name: app2
    volumes:
      - ./app2/index.html:/usr/share/nginx/html/index.html:ro

  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
